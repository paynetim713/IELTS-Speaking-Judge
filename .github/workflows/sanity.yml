name: sanity

# A minimal CI: install deps, byte-compile the modules, run the
# question-bank build deterministically. Catches accidental syntax errors,
# bad imports, and bank-schema regressions on every push.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Byte-compile (catch SyntaxError)
        run: python -m compileall -q webapp.py llm_provider.py db.py question_bank.py build_bank.py

      - name: Import smoke test (default sqlite/ollama)
        run: |
          python -c "
          import sys, importlib
          sys.path.insert(0, '.')
          for m in ('question_bank', 'llm_provider', 'db'):
              importlib.import_module(m)
              print(f'✓ {m}')
          import webapp
          print(f'✓ webapp ({len(webapp.PART1_BANK)} P1, {len(webapp.PART2_BANK)} P2, {len(webapp.PART3_THEMES)} P3)')
          "

      - name: Import smoke test (prod simulation — groq/postgres-url)
        env:
          IELTS_ENV: prod
          IELTS_SECRET_KEY: ci-fake-secret-key-32-hex
          LLM_PROVIDER: groq
          GROQ_API_KEY: ci-fake-key
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          import webapp
          assert webapp.IS_PROD
          assert webapp.llm_provider.PROVIDER == 'groq'
          assert webapp.MODEL_NAME == 'llama-3.3-70b-versatile'
          print('✓ prod boot OK')
          "

      - name: Rebuild the question bank (must be deterministic)
        run: |
          python build_bank.py
          # No git diff allowed — the checked-in question_bank.py must equal the rebuild output.
          if ! git diff --quiet question_bank.py; then
            echo "ERROR: question_bank.py is out of sync with sources. Run 'python build_bank.py' locally and commit."
            git diff question_bank.py | head -50
            exit 1
          fi
          echo "✓ question_bank.py is reproducible from cambridge_manual.json"

      - name: HTML script-tag sanity (catch </script> leaked into JS)
        run: python .github/scripts/check_html.py

      - name: End-to-end API smoke test
        env:
          IELTS_ENV: dev
        run: |
          # Boot the server in the background, wait for /healthz, then exercise
          # every public + admin endpoint we care about. ANY failure → exit 1.
          python -m uvicorn webapp:app --port 8765 --log-level warning &
          SERVER_PID=$!
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8765/healthz > /dev/null; then break; fi
            sleep 1
          done
          if ! curl -sf http://127.0.0.1:8765/healthz > /dev/null; then
            echo "Server didn't come up"; kill $SERVER_PID 2>/dev/null; exit 1
          fi
          python .github/scripts/e2e.py
          kill $SERVER_PID 2>/dev/null
          wait 2>/dev/null
          echo "✓ e2e smoke OK"
